{% extends 'base.html' %}

{% block body %}
  <div class="container mt-3">
    <h1 style="color: green">Sua Saúde</h1>
    <h2>Primeiro projeto de site por Rafael Patrick de Souza Oliveira</h2>
    <hr>
    {% for post in posts %}
      <div class="row border mt-4 p-3 meupost">
        <div class="col col-3">
          <img src="{{ url_for('static', filename='fotos_perfil/{}'.format(post.autor.foto_perfil)) }}" class="rounded" width="200"></img>
          <br>
          <strong>{{ post.autor.username }}</strong>
        </div>
        <div class="col col-9">
          <a style="text-decoration: none" href="{{ url_for('exibir_post', post_id=post.id) }}"><h4>{{ post.titulo }}</h4></a>
          <p>{{ post.corpo }}</p>
        </div>
      </div>
    {% endfor %}
  </div>
{% endblock %}
